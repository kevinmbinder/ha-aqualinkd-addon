name: AqualinkD
version: "2.3.6"
slug: aqualinkd
description: >-
  Jandy/Zodiac AquaLink RS pool controller bridge. Reads RS-485 serial data
  and publishes pool devices to Home Assistant via MQTT discovery.
url: https://github.com/aqualinkd/AqualinkD
arch:
  - aarch64
  - amd64
init: false
startup: services
devices:
  - /dev/ttyUSB0
ports:
  "80/tcp": 6171
ports_description:
  "80/tcp": AqualinkD Web UI
webui: "http://[HOST]:[PORT:80]"
map:
  - data:rw
options:
  serial_port: /dev/ttyUSB0
  mqtt_address: "mqtt://core-mosquitto:1883"
  mqtt_discovery_topic: homeassistant
  log_level: NOTICE
  panel_type: RS-8 Combo
  device_id: "0x09"
schema:
  serial_port: str
  mqtt_address: str
  mqtt_discovery_topic: str
  log_level: list(DEBUG|NOTICE|WARNING|ERROR)
  panel_type: str
  device_id: str
  mqtt_user: str?
  mqtt_passwd: str?
